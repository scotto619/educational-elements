<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Meeting Presenter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f0ff;
  --slide-bg: #ffffff;
  --header-bg: #ddd0f5;
  --accent1: #b5ead7;
  --accent2: #ffd7ba;
  --accent3: #c7ceea;
  --accent4: #ffdfd3;
  --accent5: #fff3ba;
  --accent6: #b5d8eb;
  --text: #1a1a2e;
  --border: #1a1a2e;
  --sidebar-bg: #ede5ff;
  --nav-bg: #ddd0f5;
  --choice-bg: #ffffff;
  --choice-hover: #ede5ff;
  --section-welcome: #ddd0f5;
  --section-calendar: #b5d8eb;
  --section-game: #b5ead7;
  --section-word: #ffd7ba;
  --section-grammar: #c7ceea;
  --section-math: #ffdfd3;
  --section-spelling: #fff3ba;
  --section-qod: #d4f0b5;
  --section-announce: #ffd7e3;
  --section-schedule: #e0f0ff;
}

[data-theme="ocean"] {
  --bg: #dff4ff; --slide-bg: #f0faff; --header-bg: #a8d8ea;
  --accent1: #7ec8d4; --accent2: #a8d8ea; --accent3: #5b9bd5;
  --accent4: #b3cde0; --accent5: #d4eaf7; --accent6: #e8f4f8;
  --sidebar-bg: #c8e8f4; --nav-bg: #a8d8ea;
  --choice-bg: #f0faff; --choice-hover: #c8e8f4;
  --section-welcome: #a8d8ea; --section-calendar: #7ec8d4;
  --section-game: #b3cde0; --section-word: #a8d8ea;
  --section-grammar: #5b9bd5; --section-math: #d4eaf7;
  --section-spelling: #e8f4f8; --section-qod: #c8e8f4;
  --section-announce: #b3cde0; --section-schedule: #7ec8d4;
}

[data-theme="sunrise"] {
  --bg: #fff5e6; --slide-bg: #fffaf5; --header-bg: #ffd7ba;
  --accent1: #ffb347; --accent2: #ff8c69; --accent3: #ffa07a;
  --accent4: #ffd700; --accent5: #ffc0cb; --accent6: #ffe4b5;
  --sidebar-bg: #ffe4cc; --nav-bg: #ffd7ba;
  --choice-bg: #fffaf5; --choice-hover: #ffe4cc;
  --section-welcome: #ffd7ba; --section-calendar: #ffe4b5;
  --section-game: #ffb347; --section-word: #ffa07a;
  --section-grammar: #ffd700; --section-math: #ffc0cb;
  --section-spelling: #ff8c69; --section-qod: #ffe4cc;
  --section-announce: #ffd7ba; --section-schedule: #ffe4b5;
}

[data-theme="forest"] {
  --bg: #e8f5e9; --slide-bg: #f5fff5; --header-bg: #c8e6c9;
  --accent1: #a5d6a7; --accent2: #80cbc4; --accent3: #b2dfdb;
  --accent4: #dce8d0; --accent5: #f0f4c3; --accent6: #c5e1a5;
  --sidebar-bg: #d4edd5; --nav-bg: #c8e6c9;
  --choice-bg: #f5fff5; --choice-hover: #d4edd5;
  --section-welcome: #c8e6c9; --section-calendar: #a5d6a7;
  --section-game: #80cbc4; --section-word: #b2dfdb;
  --section-grammar: #dce8d0; --section-math: #f0f4c3;
  --section-spelling: #c5e1a5; --section-qod: #a5d6a7;
  --section-announce: #b2dfdb; --section-schedule: #dce8d0;
}

[data-theme="night"] {
  --bg: #0d1117; --slide-bg: #161b22; --header-bg: #1f2d3d;
  --accent1: #2d5a3d; --accent2: #5a3d2d; --accent3: #2d3d5a;
  --accent4: #5a2d3d; --accent5: #3d5a2d; --accent6: #2d4a5a;
  --text: #e6edf3; --border: #58a6ff;
  --sidebar-bg: #0d1117; --nav-bg: #1f2d3d;
  --choice-bg: #21262d; --choice-hover: #2d333b;
  --section-welcome: #1f2d3d; --section-calendar: #2d4a5a;
  --section-game: #2d5a3d; --section-word: #5a3d2d;
  --section-grammar: #2d3d5a; --section-math: #5a2d3d;
  --section-spelling: #3d5a2d; --section-qod: #2d5a4a;
  --section-announce: #5a2d4a; --section-schedule: #2d3d5a;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background 0.3s, color 0.3s;
}

/* HEADER */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--header-bg);
  border-bottom: 3px solid var(--border);
  flex-shrink: 0;
  gap: 10px;
}

#header-title {
  font-size: 1.2rem;
  font-weight: 900;
  flex: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hbtn {
  background: var(--choice-bg);
  border: 2.5px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 0.9rem;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  color: var(--text);
  transition: transform 0.1s;
  white-space: nowrap;
}
.hbtn:hover { transform: scale(1.05); }

/* MAIN */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* SIDEBAR */
#sidebar {
  width: 70px;
  background: var(--sidebar-bg);
  border-right: 3px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 4px;
  gap: 5px;
  overflow-y: auto;
  flex-shrink: 0;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; opacity: 0.3; }

.sbtn {
  width: 54px;
  min-height: 54px;
  border: 2.5px solid var(--border);
  border-radius: 12px;
  background: var(--choice-bg);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  transition: transform 0.1s, background 0.15s;
  padding: 4px 2px;
}
.sbtn:hover { transform: scale(1.08); }
.sbtn.active { background: var(--header-bg); border-width: 3px; }
.sbtn.off { opacity: 0.3; pointer-events: none; }
.sbtn-label {
  font-size: 0.38rem;
  font-weight: 900;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.1;
  margin-top: 3px;
  max-width: 52px;
}

/* SLIDE AREA */
#slide-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#slide-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

/* NAV BAR */
#nav-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 9px 16px;
  background: var(--nav-bg);
  border-top: 3px solid var(--border);
  gap: 16px;
  flex-shrink: 0;
}

.nbtn {
  background: var(--choice-bg);
  border: 2.5px solid var(--border);
  border-radius: 10px;
  padding: 7px 18px;
  font-size: 1rem;
  font-weight: 900;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  transition: transform 0.1s;
}
.nbtn:hover { transform: scale(1.05); }
.nbtn:disabled { opacity: 0.35; cursor: default; transform: none; }

#slide-counter {
  font-weight: 900;
  font-size: 0.95rem;
  min-width: 70px;
  text-align: center;
}

/* SLIDE */
.slide {
  width: 100%;
  max-width: 860px;
  animation: fadein 0.2s ease;
}
@keyframes fadein { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

/* SHARED SLIDE ELEMENTS */
.sec-header {
  border: 3.5px solid var(--border);
  border-radius: 14px;
  padding: 12px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 1.6rem;
  font-weight: 900;
  text-transform: uppercase;
}
.sec-icon { font-size: 2rem; }

.q-card {
  background: var(--slide-bg);
  border: 3.5px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  text-align: center;
  font-size: 1.7rem;
  font-weight: 800;
  margin-bottom: 16px;
  line-height: 1.35;
}

.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.choice {
  background: var(--choice-bg);
  border: 3px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  font-size: 1.15rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background 0.12s, transform 0.1s;
}
.choice:hover { background: var(--choice-hover); transform: scale(1.02); }
.choice.correct { background: #b5ead7 !important; border-color: #2a9d70 !important; }
.choice.wrong   { background: #ffd7d7 !important; border-color: #c0392b !important; }

.choice-letter {
  background: var(--border);
  color: var(--slide-bg);
  width: 34px;
  height: 34px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 900;
  flex-shrink: 0;
}

.abtn {
  background: var(--slide-bg);
  border: 2.5px solid var(--border);
  border-radius: 10px;
  padding: 11px 22px;
  font-size: 1rem;
  font-weight: 900;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  transition: transform 0.1s;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}
.abtn:hover { transform: scale(1.05); }
.abtn.reveal-btn { background: var(--accent6); }

.reveal-box {
  display: none;
  background: var(--accent1);
  border: 3px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  text-align: center;
  font-size: 1.4rem;
  font-weight: 900;
  margin-top: 12px;
}

/* TRUE / FALSE */
.tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.tf-card {
  border: 3.5px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  text-align: center;
  font-size: 1.8rem;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.1s;
}
.tf-card:hover { transform: scale(1.03); }
.tf-true { background: #b5ead7; }
.tf-false { background: #ffd7d7; }

/* THIS OR THAT / WOULD I RATHER */
.tot-grid { display: grid; grid-template-columns: 1fr 56px 1fr; gap: 14px; align-items: center; margin-bottom: 16px; }
.tot-card {
  border: 3.5px solid var(--border);
  border-radius: 14px;
  padding: 28px 16px;
  text-align: center;
  font-size: 1.4rem;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.12s;
  line-height: 1.3;
}
.tot-card:hover { transform: scale(1.05); }
.tot-or { font-size: 1.6rem; font-weight: 900; text-align: center; }

/* WORD OF DAY */
.word-card {
  border: 3.5px solid var(--border);
  border-radius: 18px;
  padding: 28px;
  margin-bottom: 14px;
  background: var(--section-word);
}
.word-title { font-size: 3rem; font-weight: 900; text-align: center; margin-bottom: 6px; }
.word-pos { text-align: center; font-style: italic; font-size: 1.05rem; font-weight: 700; margin-bottom: 14px; opacity: 0.75; }
.word-def { font-size: 1.25rem; font-weight: 700; text-align: center; margin-bottom: 14px; line-height: 1.4; }
.word-ex {
  background: var(--slide-bg);
  border: 2.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 18px;
  font-size: 1.05rem;
  font-weight: 700;
  font-style: italic;
  text-align: center;
}

/* MATH */
.math-problem {
  border: 3.5px solid var(--border);
  border-radius: 18px;
  padding: 36px;
  text-align: center;
  font-size: 2.4rem;
  font-weight: 900;
  margin-bottom: 14px;
  background: var(--section-math);
}
.math-hint {
  background: var(--slide-bg);
  border: 2.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 1.05rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 14px;
}

/* SPELLING */
.spelling-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.spell-word {
  background: var(--section-spelling);
  border: 2.5px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
  font-size: 1.2rem;
  font-weight: 900;
}

/* QOD */
.qod-card {
  border: 3.5px solid var(--border);
  border-radius: 18px;
  padding: 36px;
  text-align: center;
  font-size: 1.8rem;
  font-weight: 800;
  margin-bottom: 16px;
  line-height: 1.4;
  background: var(--section-qod);
}

/* EDITABLE */
.edit-box {
  background: var(--slide-bg);
  border: 2.5px dashed var(--border);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 10px;
}
.edit-label {
  font-weight: 900;
  font-size: 0.85rem;
  text-transform: uppercase;
  opacity: 0.65;
  margin-bottom: 7px;
}
textarea.edit-ta {
  width: 100%;
  border: none;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  resize: vertical;
  min-height: 80px;
}
textarea.edit-ta:focus { outline: none; }
.edit-note { font-size: 0.78rem; font-weight: 700; opacity: 0.55; text-align: center; margin-top: 4px; }

.blank-input {
  display: inline-block;
  border: none;
  border-bottom: 3.5px solid var(--border);
  background: transparent;
  font-size: 1.7rem;
  font-weight: 900;
  font-family: 'Nunito', sans-serif;
  width: 180px;
  text-align: center;
  color: var(--text);
  padding: 0 4px;
}
.blank-input:focus { outline: none; }

/* FINISH THE SENTENCE */
.fts-prompt {
  border: 3.5px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  font-size: 1.7rem;
  font-weight: 800;
  text-align: center;
  margin-bottom: 16px;
  line-height: 1.45;
  background: var(--section-announce);
}

/* LIST IT */
.list-box {
  border: 3.5px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  margin-bottom: 14px;
  background: var(--section-spelling);
}
.list-challenge { font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 16px; }
.list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.list-item {
  background: var(--slide-bg);
  border: 2.5px solid var(--border);
  border-radius: 9px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 9px;
}
.list-num {
  background: var(--border);
  color: var(--slide-bg);
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 900; flex-shrink: 0;
}
.list-item input {
  border: none; background: transparent;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
  color: var(--text); flex: 1;
}
.list-item input:focus { outline: none; }

/* GUESS MY FAVORITE */
.gmf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; margin-bottom: 14px; }
.gmf-card {
  border: 3px solid var(--border);
  border-radius: 13px;
  padding: 22px 14px;
  text-align: center;
  cursor: pointer;
  font-size: 1.2rem;
  font-weight: 800;
  transition: transform 0.1s;
  background: var(--section-announce);
}
.gmf-card:hover { transform: scale(1.04); }
.gmf-card.gmf-right { background: #b5ead7 !important; border-color: #2a9d70 !important; }
.gmf-card.gmf-wrong { background: #ffd7d7 !important; border-color: #c0392b !important; opacity: 0.7; }

/* SCHEDULE */
.sched-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--slide-bg);
  border: 2.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 8px;
}
.sched-time {
  font-weight: 900; font-size: 0.9rem; min-width: 65px;
  border: none; background: transparent;
  font-family: 'Nunito', sans-serif; color: var(--text);
}
.sched-subj {
  flex: 1; font-size: 1rem; font-weight: 800;
  border: none; background: transparent;
  font-family: 'Nunito', sans-serif; color: var(--text);
}
.sched-time:focus, .sched-subj:focus { outline: none; background: var(--choice-hover); border-radius: 6px; padding: 2px 4px; }

/* WELCOME */
.welcome-slide {
  background: var(--section-welcome);
  border: 4px solid var(--border);
  border-radius: 22px;
  padding: 40px 32px;
  text-align: center;
  min-height: 380px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
}
.welcome-date { font-size: 2.6rem; font-weight: 900; line-height: 1.2; }
.welcome-edit {
  background: var(--slide-bg);
  border: 2.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 22px;
  font-size: 1.5rem; font-weight: 900; text-align: center;
  min-width: 300px;
}
.welcome-edit:focus { outline: 3px solid var(--border); }

/* SETTINGS OVERLAY */
#settings-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 200;
  align-items: center; justify-content: center;
}
#settings-overlay.open { display: flex; }
#settings-panel {
  background: var(--slide-bg); border: 3.5px solid var(--border);
  border-radius: 22px; padding: 28px;
  max-width: 520px; width: 92%; max-height: 88vh; overflow-y: auto;
}
#settings-panel h2 { font-size: 1.6rem; font-weight: 900; text-align: center; margin-bottom: 22px; }
.stg-sec { margin-bottom: 22px; }
.stg-sec h3 { font-size: 0.95rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid var(--border); }

.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid rgba(128,128,128,0.15);
}
.toggle-label { font-weight: 800; display: flex; align-items: center; gap: 7px; }
.switch { position: relative; width: 50px; height: 26px; }
.switch input { opacity: 0; width: 0; height: 0; }
.track {
  position: absolute; inset: 0; background: #ccc; border-radius: 26px;
  border: 2px solid var(--border); cursor: pointer; transition: background 0.2s;
}
.switch input:checked + .track { background: #6c5ce7; }
.track::after {
  content: ''; position: absolute; width: 18px; height: 18px;
  left: 2px; top: 2px; background: white; border-radius: 50%; transition: transform 0.2s;
}
.switch input:checked + .track::after { transform: translateX(24px); }

.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.tbtn {
  border: 2.5px solid var(--border); border-radius: 10px; padding: 10px 6px;
  cursor: pointer; text-align: center; font-weight: 800; font-size: 0.8rem;
  font-family: 'Nunito', sans-serif; transition: transform 0.1s; color: inherit;
}
.tbtn:hover { transform: scale(1.05); }
.tbtn.active { border-width: 4px; }

.day-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
.day-row input[type=number] {
  width: 58px; padding: 7px; border: 2px solid var(--border); border-radius: 8px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; text-align: center;
  background: var(--slide-bg); color: var(--text);
}
.stg-close {
  width: 100%; margin-top: 14px; padding: 13px;
  background: var(--header-bg); border: 2.5px solid var(--border); border-radius: 12px;
  font-size: 1rem; font-weight: 900; cursor: pointer;
  font-family: 'Nunito', sans-serif; color: var(--text);
}

/* FULLSCREEN */
:fullscreen body { height: 100vh; }

@media (min-height: 750px) {
  .welcome-date { font-size: 3.2rem; }
  .q-card { font-size: 1.9rem; }
  .math-problem { font-size: 2.8rem; }
}
</style>
</head>
<body>

<!-- SETTINGS -->
<div id="settings-overlay">
  <div id="settings-panel">
    <h2>⚙️ Presentation Settings</h2>

    <div class="stg-sec">
      <h3>🎨 Theme</h3>
      <div class="theme-grid">
        <button class="tbtn active" style="background:#ddd0f5;" data-theme="pastel">🌸 Pastel</button>

// ============================================================
// STATE
// ============================================================
let cur = 0;
let active = [];
let dayIdx = 0;
let day = null;
let theme = 'pastel';

// ============================================================
// INIT
// ============================================================
function init() {
  const s = safeLoad('mmSettings', {});
  if (s.theme) applyTheme(s.theme, false);
  if (s.sections) SECTIONS.forEach(sec => { if (!sec.alwaysOn && s.sections[sec.id] != null) sec.enabled = s.sections[sec.id]; });

  const override = parseInt(safeLoad('mmDayOverride', 0));
  if (override >= 1 && override <= 20) {
    dayIdx = override - 1;
  } else {
    const now = new Date();
    const doy = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
    dayIdx = Math.max(0, (doy - 1)) % 20;
  }
  day = DAYS[dayIdx];

  buildSidebar();
  buildToggles();
  refreshActive();
  render();
}

function safeLoad(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch(e) { return def; } }
function safeSave(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

function getDay() { const o = parseInt(safeLoad('mmDayOverride', 0)); if (o >= 1 && o <= 20) return o; const n = new Date(); return Math.max(0,(Math.floor((n - new Date(n.getFullYear(),0,0))/86400000)-1)) % 20 + 1; }

// ============================================================
// SIDEBAR
// ============================================================
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  SECTIONS.forEach(sec => {
    const b = document.createElement('button');
    b.className = 'sbtn' + (sec.enabled ? '' : ' off');
    b.dataset.sid = sec.id;
    b.title = sec.label;
    b.innerHTML = `<span>${sec.icon}</span><span class="sbtn-label">${sec.label}</span>`;
    b.onclick = () => goTo(sec.id);
    sb.appendChild(b);
  });
}

function syncSidebar() {
  const c = active[cur];
  document.querySelectorAll('.sbtn').forEach(b => {
    b.classList.toggle('active', b.dataset.sid === c?.id);
    const sec = SECTIONS.find(s => s.id === b.dataset.sid);
    b.classList.toggle('off', !sec?.enabled);
  });
}

function goTo(id) { const i = active.findIndex(s => s.id === id); if (i >= 0) { cur = i; render(); } }

// ============================================================
// NAVIGATION
// ============================================================
function nav(d) { cur = Math.max(0, Math.min(active.length - 1, cur + d)); render(); }

function refreshActive() { active = SECTIONS.filter(s => s.enabled); cur = Math.min(cur, Math.max(0, active.length - 1)); }

function updateNav() {
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === active.length - 1;
  document.getElementById('slide-counter').textContent = `${cur + 1} / ${active.length}`;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const wrap = document.getElementById('slide-wrap');
  const sec = active[cur];
  if (!sec) return;
  wrap.innerHTML = '';
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.innerHTML = builders[sec.id] ? builders[sec.id]() : `<p>Section: ${sec.label}</p>`;
  wrap.appendChild(slide);
  updateNav();
  syncSidebar();
}

function sColor(id) {
  const sec = SECTIONS.find(s => s.id === id);
  return sec ? `var(${sec.colorVar})` : 'var(--accent1)';
}

function secHeader(id) {
  const sec = SECTIONS.find(s => s.id === id);
  return `<div class="sec-header" style="background:${sColor(id)};"><span class="sec-icon">${sec.icon}</span><span>${sec.label}</span></div>`;
}

function fmtDate() {
  const d = new Date();
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()] + ', ' +
    ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()] + ' ' +
    d.getDate() + ', ' + d.getFullYear();
}

function ge(key, def='') { const e = safeLoad('mmEdits', {}); return e[key] !== undefined ? e[key] : def; }
function se(key, val) { const e = safeLoad('mmEdits', {}); e[key] = val; safeSave('mmEdits', e); }

// ============================================================
// INTERACTION HELPERS
// ============================================================
function revealMC(el, isOk) {
  document.querySelectorAll('.choice[data-ok]').forEach(c => {
    c.classList.remove('correct','wrong');
    c.classList.add(c.dataset.ok === 'true' ? 'correct' : 'wrong');
    c.onclick = null;
  });
}

function revealGramMC(el, isOk) {
  document.querySelectorAll('.choice[data-ok]').forEach(c => {
    c.classList.remove('correct','wrong');
    c.classList.add(c.dataset.ok === 'true' ? 'correct' : 'wrong');
    c.onclick = null;
  });
}

function revealTF(el, clicked, correct, explainId) {
  el.style.border = (clicked === correct) ? '4px solid #2a9d70' : '4px solid #c0392b';
  document.querySelectorAll('.tf-card').forEach(c => { c.style.opacity = '0.75'; c.onclick = null; });
  el.style.opacity = '1';
  const box = document.getElementById(explainId);
  if (box) box.style.display = 'block';
}

function revealGMF(el, isOk) {
  document.querySelectorAll('.gmf-card').forEach(c => { c.onclick = null; c.style.opacity = '0.65'; });
  el.style.opacity = '1';
  el.classList.add(isOk ? 'gmf-right' : 'gmf-wrong');
  // Also highlight the correct one
  const cards = document.querySelectorAll('.gmf-card');
  const ansIdx = day.game.ans;
  cards[ansIdx].classList.add('gmf-right');
  cards[ansIdx].style.opacity = '1';
}

// ============================================================
// SCHEDULE SAVE
// ============================================================
function saveSchedule(i, field, val) {
  const def = [
    {t:'8:00 AM',s:'Morning Meeting'},{t:'8:30 AM',s:'Math'},{t:'9:30 AM',s:'Reading / ELA'},
    {t:'10:30 AM',s:'Snack & Break'},{t:'11:00 AM',s:'Writing'},{t:'12:00 PM',s:'Lunch & Recess'},
    {t:'1:00 PM',s:'Science / Social Studies'},{t:'2:00 PM',s:'Specials'},{t:'3:00 PM',s:'Pack Up & Dismissal'},
  ];
  const sched = safeLoad('mmSchedule', def);
  sched[i][field] = val;
  safeSave('mmSchedule', sched);
}

// ============================================================
// SETTINGS
// ============================================================
function buildToggles() {
  const container = document.getElementById('toggle-list');
  container.innerHTML = '';
  SECTIONS.filter(s => !s.alwaysOn).forEach(sec => {
    const row = document.createElement('div');
    row.className = 'toggle-row';
    row.innerHTML = `
      <div class="toggle-label"><span>${sec.icon}</span><span>${sec.label}</span></div>
      <label class="switch">
        <input type="checkbox" ${sec.enabled ? 'checked' : ''} onchange="toggleSec('${sec.id}',this.checked)">
        <div class="track"></div>
      </label>`;
    container.appendChild(row);
  });
}

function toggleSec(id, on) {
  const s = SECTIONS.find(x => x.id === id);
  if (s) { s.enabled = on; }
  const btn = document.querySelector(`.sbtn[data-sid="${id}"]`);
  if (btn) btn.classList.toggle('off', !on);
  saveSettings();
}

function saveSettings() {
  const secs = {};
  SECTIONS.forEach(s => { secs[s.id] = s.enabled; });
  safeSave('mmSettings', { theme, sections: secs });
}

function openSettings() {
  document.getElementById('day-input').value = getDay();
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
  refreshActive();
  render();
}

function applyDay() {
  const v = parseInt(document.getElementById('day-input').value);
  if (v >= 1 && v <= 20) { safeSave('mmDayOverride', v); dayIdx = v-1; day = DAYS[dayIdx]; render(); }
}

function clearDay() {
  localStorage.removeItem('mmDayOverride');
  const n = new Date();
  dayIdx = Math.max(0,(Math.floor((n-new Date(n.getFullYear(),0,0))/86400000)-1)) % 20;
  day = DAYS[dayIdx];
  document.getElementById('day-input').value = dayIdx + 1;
  render();
}

// ============================================================
// THEMES
// ============================================================
function applyTheme(t, save=true) {
  theme = t;
  document.documentElement.dataset.theme = (t === 'pastel' ? '' : t);
  document.querySelectorAll('.tbtn').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
  if (save) saveSettings();
}

document.querySelectorAll('.tbtn').forEach(b => b.onclick = () => applyTheme(b.dataset.theme));

// ============================================================
// FULLSCREEN
// ============================================================
function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById('fs-btn').textContent = '⊠ Exit Full';
  } else {
    document.exitFullscreen();
    document.getElementById('fs-btn').textContent = '⛶ Fullscreen';
  }
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) document.getElementById('fs-btn').textContent = '⛶ Fullscreen';
});

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement?.contentEditable === 'true') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nav(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); nav(-1); }
  if (e.key === 'f' || e.key === 'F') toggleFS();
  if (e.key === 'Escape') { if (document.getElementById('settings-overlay').classList.contains('open')) closeSettings(); }
});

// Close overlay on background click
document.getElementById('settings-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
});

// ============================================================
// GO
// ============================================================
init();
</script>
