<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="oval" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(234,179,8,0.7)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="32" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <g opacity="0.08">
    <circle cx="30"  cy="30"  r="4" fill="white"/>
    <circle cx="80"  cy="30"  r="4" fill="white"/>
    <circle cx="130" cy="30"  r="4" fill="white"/>
    <circle cx="180" cy="30"  r="4" fill="white"/>
    <circle cx="230" cy="30"  r="4" fill="white"/>
    <circle cx="280" cy="30"  r="4" fill="white"/>
    <circle cx="330" cy="30"  r="4" fill="white"/>
    <circle cx="380" cy="30"  r="4" fill="white"/>
    <circle cx="30"  cy="80"  r="4" fill="white"/>
    <circle cx="80"  cy="80"  r="4" fill="white"/>
    <circle cx="330" cy="80"  r="4" fill="white"/>
    <circle cx="380" cy="80"  r="4" fill="white"/>
    <circle cx="30"  cy="270" r="4" fill="white"/>
    <circle cx="80"  cy="270" r="4" fill="white"/>
    <circle cx="330" cy="270" r="4" fill="white"/>
    <circle cx="380" cy="270" r="4" fill="white"/>
  </g>

  <!-- Fanned cards in background -->
  <!-- Card 1 (leftmost, blue) -->
  <g transform="translate(110,30) rotate(-28)" filter="url(#shadow)">
    <rect width="64" height="96" rx="8" fill="url(#card1)" stroke="white" stroke-width="3"/>
    <ellipse cx="32" cy="48" rx="20" ry="32" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3" transform="rotate(-20,32,48)"/>
    <text x="32" y="22" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">+4</text>
    <text x="32" y="82" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" transform="rotate(180,32,76)">+4</text>
  </g>

  <!-- Card 2 (red) -->
  <g transform="translate(148,18) rotate(-14)" filter="url(#shadow)">
    <rect width="64" height="96" rx="8" fill="url(#card2)" stroke="white" stroke-width="3"/>
    <ellipse cx="32" cy="48" rx="20" ry="32" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3" transform="rotate(-20,32,48)"/>
    <text x="32" y="22" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">🚫</text>
    <text x="32" y="79" font-family="Arial Black,sans-serif" font-size="11" font-weight="900" fill="white" text-anchor="middle">Skip</text>
  </g>

  <!-- Card 3 (green) -->
  <g transform="translate(188,14) rotate(0)" filter="url(#shadow)">
    <rect width="64" height="96" rx="8" fill="url(#card3)" stroke="white" stroke-width="3"/>
    <ellipse cx="32" cy="48" rx="20" ry="32" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3" transform="rotate(-20,32,48)"/>
    <text x="32" y="22" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">🔄</text>
    <text x="32" y="79" font-family="Arial Black,sans-serif" font-size="9" font-weight="900" fill="white" text-anchor="middle">Rev</text>
  </g>

  <!-- Card 4 (yellow) -->
  <g transform="translate(228,18) rotate(14)" filter="url(#shadow)">
    <rect width="64" height="96" rx="8" fill="url(#card4)" stroke="white" stroke-width="3"/>
    <ellipse cx="32" cy="48" rx="20" ry="32" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3" transform="rotate(-20,32,48)"/>
    <text x="32" y="22" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">+2</text>
    <text x="32" y="82" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" transform="rotate(180,32,76)">+2</text>
  </g>

  <!-- Yellow swirl ring -->
  <ellipse cx="200" cy="210" rx="135" ry="52" fill="none" stroke="#eab308" stroke-width="6" opacity="0.9"/>

  <!-- Red oval -->
  <ellipse cx="200" cy="210" rx="118" ry="43" fill="url(#oval)" filter="url(#shadow)"/>

  <!-- UNO text -->
  <text x="200" y="228"
    font-family="Arial Black, Impact, sans-serif"
    font-size="62"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="4"
    filter="url(#glow)"
    stroke="#1d4ed8"
    stroke-width="3"
    paint-order="stroke">UNO</text>

  <!-- Sparkles -->
  <text x="62"  y="200" font-size="18" text-anchor="middle" fill="#eab308">✦</text>
  <text x="338" y="175" font-size="14" text-anchor="middle" fill="#eab308">✦</text>
  <text x="320" y="258" font-size="10" text-anchor="middle" fill="white" opacity="0.6">✦</text>
</svg>
