<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#6f7dba">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dinner Planner">
  <title>8-Week Dinner Planner</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Easy • Affordable • Editable</p>
      <h1>Dinner Planner</h1>
    </div>
    <button id="menuButton" class="icon-button" aria-label="Open settings">⚙️</button>
  </header>

  <main id="app">
    <section id="homeView" class="view active"></section>
    <section id="calendarView" class="view"></section>
    <section id="recipesView" class="view"></section>
    <section id="shoppingView" class="view"></section>
  </main>

  <nav class="bottom-nav" aria-label="Main navigation">
    <button data-view="homeView" class="nav-button active"><span>🏠</span>Today</button>
    <button data-view="calendarView" class="nav-button"><span>📅</span>Menu</button>
    <button data-view="recipesView" class="nav-button"><span>🍳</span>Recipes</button>
    <button data-view="shoppingView" class="nav-button"><span>🛒</span>Shopping</button>
  </nav>

  <dialog id="recipeDialog" class="sheet-dialog">
    <div class="dialog-head">
      <div>
        <p id="recipeMeta" class="eyebrow"></p>
        <h2 id="recipeTitle"></h2>
      </div>
      <button class="icon-button" data-close-dialog aria-label="Close">✕</button>
    </div>
    <div id="recipeBody"></div>
  </dialog>

  <dialog id="settingsDialog" class="sheet-dialog small-dialog">
    <div class="dialog-head">
      <h2>App settings</h2>
      <button class="icon-button" data-close-dialog aria-label="Close">✕</button>
    </div>
    <div class="settings-actions">
      <button id="installButton" class="primary-button" hidden>＋ Add to Home Screen</button>
      <button id="exportButton" class="secondary-button">⬇ Export backup</button>
      <label class="secondary-button file-button">⬆ Import backup
        <input id="importInput" type="file" accept="application/json">
      </label>
      <button id="resetButton" class="danger-button">Reset all changes</button>
    </div>
    <p class="helper">Your changes are saved on this device. Export a backup before clearing browser data or changing phones.</p>
  </dialog>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <div class="empty-icon">🍽️</div>
      <h2>Nothing scheduled</h2>
      <p>This date is outside the eight-week plan.</p>
    </div>
  </template>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
