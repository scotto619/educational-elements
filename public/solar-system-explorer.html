document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ace {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"7ee76f75-cddf-4e37-a58b-e0dbe85fe077\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"cf99980c-261a-4620-bd9c-62dcf4cc4f9d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>*, *::before, *::after { box-sizing: border-box; }\nhtml, body {\n  margin: 0; padding: 0;\n  width: 100%; height: 100%;\n  overflow: hidden;\n  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  background: #000;\n  color: #fff;\n  user-select: none;\n  -webkit-font-smoothing: antialiased;\n}\n\n#app { position: fixed; inset: 0; }\n#scene { position: absolute; inset: 0; }\n#scene canvas { display: block; cursor: grab; }\n#scene canvas:active { cursor: grabbing; }\n\n/* ==== Top bar ==== */\n.topbar {\n  position: absolute; top: 20px; left: 20px; right: 20px;\n  display: flex; justify-content: space-between; align-items: flex-start;\n  pointer-events: none;\n  z-index: 10;\n}\n.brand {\n  pointer-events: auto;\n  background: rgba(10, 12, 24, 0.55);\n  backdrop-filter: blur(20px) saturate(180%);\n  -webkit-backdrop-filter: blur(20px) saturate(180%);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 14px;\n  padding: 14px 20px;\n}\n.brand .eyebrow {\n  font-size: 10px;\n  letter-spacing: 0.25em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.5);\n  margin: 0 0 4px 0;\n  font-weight: 500;\n}\n.brand h1 {\n  font-family: 'Instrument Serif', 'Times New Roman', serif;\n  font-size: 26px;\n  line-height: 1;\n  margin: 0;\n  font-weight: 400;\n  letter-spacing: -0.01em;\n}\n.brand h1 em { font-style: italic; color: #ffd27a; }\n\n.top-actions {\n  display: flex; gap: 10px; align-items: center;\n  pointer-events: auto;\n}\n.pill-btn {\n  background: rgba(10, 12, 24, 0.55);\n  backdrop-filter: blur(20px) saturate(180%);\n  -webkit-backdrop-filter: blur(20px) saturate(180%);\n  border: 1px solid rgba(255,255,255,0.08);\n  color: #fff;\n  font: inherit;\n  font-size: 12px;\n  letter-spacing: 0.02em;\n  padding: 10px 14px;\n  border-radius: 10px;\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  transition: all .2s ease;\n}\n.pill-btn:hover { background: rgba(30, 34, 52, 0.7); border-color: rgba(255,255,255,0.18); }\n.pill-btn.active { background: rgba(255, 210, 122, 0.15); border-color: rgba(255, 210, 122, 0.4); color: #ffd27a; }\n.pill-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.7; }\n\n/* ==== Bottom control dock ==== */\n.dock {\n  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);\n  display: flex; gap: 8px; align-items: center;\n  background: rgba(10, 12, 24, 0.7);\n  backdrop-filter: blur(24px) saturate(180%);\n  -webkit-backdrop-filter: blur(24px) saturate(180%);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 16px;\n  padding: 10px 14px;\n  z-index: 10;\n  flex-wrap: wrap;\n  justify-content: center;\n  max-width: calc(100vw - 40px);\n}\n.dock .group {\n  display: flex; align-items: center; gap: 8px;\n  padding: 0 10px;\n  border-right: 1px solid rgba(255,255,255,0.08);\n}\n.dock .group:last-child { border-right: none; }\n.dock label {\n  font-size: 10px;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.55);\n}\n.dock .icon-btn {\n  width: 38px; height: 38px;\n  display: inline-flex; align-items: center; justify-content: center;\n  background: rgba(255,255,255,0.05);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 10px;\n  color: #fff;\n  cursor: pointer;\n  transition: all .2s ease;\n}\n.dock .icon-btn:hover { background: rgba(255,255,255,0.12); }\n.dock .icon-btn.active { background: rgba(255, 210, 122, 0.2); border-color: rgba(255,210,122,0.5); color: #ffd27a; }\n.dock .icon-btn svg { width: 16px; height: 16px; }\n\n.slider {\n  -webkit-appearance: none; appearance: none;\n  width: 120px; height: 4px;\n  background: rgba(255,255,255,0.12);\n  border-radius: 4px;\n  outline: none;\n}\n.slider::-webkit-slider-thumb {\n  -webkit-appearance: none; appearance: none;\n  width: 14px; height: 14px;\n  border-radius: 50%;\n  background: #ffd27a;\n  cursor: pointer;\n  box-shadow: 0 0 8px rgba(255,210,122,0.5);\n}\n.slider::-moz-range-thumb {\n  width: 14px; height: 14px;\n  border-radius: 50%;\n  background: #ffd27a;\n  cursor: pointer;\n  border: none;\n  box-shadow: 0 0 8px rgba(255,210,122,0.5);\n}\n\n.speed-readout {\n  font-variant-numeric: tabular-nums;\n  font-size: 12px;\n  color: rgba(255,255,255,0.8);\n  min-width: 56px;\n  text-align: right;\n}\n\n/* ==== Planet rail (left) ==== */\n.rail {\n  position: absolute;\n  left: 20px;\n  top: 50%;\n  transform: translateY(-50%);\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  z-index: 10;\n  pointer-events: auto;\n}\n.rail-btn {\n  display: flex; align-items: center; gap: 12px;\n  background: rgba(10, 12, 24, 0.5);\n  backdrop-filter: blur(16px);\n  -webkit-backdrop-filter: blur(16px);\n  border: 1px solid rgba(255,255,255,0.06);\n  border-radius: 12px;\n  padding: 8px 14px 8px 8px;\n  cursor: pointer;\n  transition: all .25s ease;\n  color: #fff;\n  font: inherit;\n  font-size: 13px;\n  letter-spacing: 0.01em;\n  min-width: 140px;\n  text-align: left;\n}\n.rail-btn:hover {\n  background: rgba(30, 34, 52, 0.7);\n  border-color: rgba(255,255,255,0.18);\n  transform: translateX(4px);\n}\n.rail-btn.active {\n  background: rgba(255, 210, 122, 0.12);\n  border-color: rgba(255, 210, 122, 0.4);\n}\n.rail-swatch {\n  width: 22px; height: 22px;\n  border-radius: 50%;\n  flex-shrink: 0;\n  box-shadow: inset -3px -3px 6px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.1);\n}\n.rail-name {\n  flex: 1;\n  font-weight: 500;\n}\n.rail-meta {\n  font-size: 10px;\n  color: rgba(255,255,255,0.5);\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n}\n\n/* ==== Info panel (right) ==== */\n.info-panel {\n  position: absolute;\n  right: 20px;\n  top: 90px;\n  bottom: 100px;\n  width: 400px;\n  background: rgba(10, 12, 24, 0.75);\n  backdrop-filter: blur(28px) saturate(180%);\n  -webkit-backdrop-filter: blur(28px) saturate(180%);\n  border: 1px solid rgba(255,255,255,0.1);\n  border-radius: 18px;\n  padding: 28px;\n  overflow-y: auto;\n  z-index: 10;\n  transform: translateX(440px);\n  opacity: 0;\n  transition: transform .5s cubic-bezier(0.22, 1, 0.36, 1), opacity .4s ease;\n  pointer-events: none;\n}\n.info-panel.open {\n  transform: translateX(0);\n  opacity: 1;\n  pointer-events: auto;\n}\n\n.info-panel::-webkit-scrollbar { width: 6px; }\n.info-panel::-webkit-scrollbar-track { background: transparent; }\n.info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }\n\n.info-close {\n  position: absolute;\n  top: 18px; right: 18px;\n  width: 32px; height: 32px;\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 8px;\n  color: #fff;\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  transition: all .2s ease;\n}\n.info-close:hover { background: rgba(255,255,255,0.12); }\n\n.info-hero {\n  display: flex; align-items: center; gap: 14px;\n  margin-bottom: 8px;\n}\n.info-orb {\n  width: 48px; height: 48px;\n  border-radius: 50%;\n  box-shadow: inset -6px -6px 14px rgba(0,0,0,0.5), 0 0 24px rgba(255,210,122,0.2);\n  flex-shrink: 0;\n}\n.info-type {\n  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;\n  color: rgba(255,255,255,0.5);\n  margin: 0 0 2px 0;\n}\n.info-name {\n  font-family: 'Instrument Serif', serif;\n  font-size: 38px; line-height: 1;\n  font-weight: 400;\n  margin: 0;\n  letter-spacing: -0.01em;\n}\n\n.info-blurb {\n  font-size: 14px; line-height: 1.55;\n  color: rgba(255,255,255,0.78);\n  margin: 16px 0 20px 0;\n  text-wrap: pretty;\n}\n\n.tabs {\n  display: flex; gap: 4px;\n  border-bottom: 1px solid rgba(255,255,255,0.08);\n  margin-bottom: 16px;\n}\n.tab {\n  background: transparent;\n  border: none;\n  color: rgba(255,255,255,0.55);\n  font: inherit;\n  font-size: 12px;\n  letter-spacing: 0.04em;\n  padding: 10px 12px;\n  cursor: pointer;\n  border-bottom: 2px solid transparent;\n  margin-bottom: -1px;\n  transition: all .2s ease;\n}\n.tab:hover { color: #fff; }\n.tab.active {\n  color: #ffd27a;\n  border-bottom-color: #ffd27a;\n}\n\n.tab-content { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.82); }\n.tab-content h4 {\n  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;\n  color: rgba(255,255,255,0.5);\n  margin: 20px 0 8px 0;\n  font-weight: 500;\n}\n.tab-content h4:first-child { margin-top: 0; }\n\n.stat-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 1px;\n  background: rgba(255,255,255,0.06);\n  border-radius: 10px;\n  overflow: hidden;\n  border: 1px solid rgba(255,255,255,0.06);\n}\n.stat {\n  background: rgba(10, 12, 24, 0.6);\n  padding: 12px 14px;\n}\n.stat-label {\n  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: rgba(255,255,255,0.5);\n  margin-bottom: 4px;\n}\n.stat-value {\n  font-size: 13px;\n  color: #fff;\n  font-variant-numeric: tabular-nums;\n  text-wrap: balance;\n}\n\n.fact-list {\n  list-style: none;\n  padding: 0; margin: 0;\n  display: flex; flex-direction: column; gap: 10px;\n}\n.fact-list li {\n  display: flex; gap: 10px;\n  padding: 12px 14px;\n  background: rgba(255,255,255,0.03);\n  border: 1px solid rgba(255,255,255,0.05);\n  border-radius: 10px;\n  font-size: 13px;\n  line-height: 1.5;\n}\n.fact-list li::before {\n  content: '◆';\n  color: #ffd27a;\n  font-size: 10px;\n  line-height: 1.8;\n  flex-shrink: 0;\n}\n\n.expl-list { list-style: none; padding: 0; margin: 0; }\n.expl-list li {\n  padding: 10px 0;\n  border-top: 1px solid rgba(255,255,255,0.06);\n  font-size: 13px;\n  line-height: 1.5;\n  color: rgba(255,255,255,0.82);\n}\n.expl-list li:first-child { border-top: none; padding-top: 0; }\n\n.compare-bar {\n  height: 6px;\n  background: rgba(255,255,255,0.08);\n  border-radius: 3px;\n  overflow: hidden;\n  margin: 6px 0 2px 0;\n}\n.compare-fill {\n  height: 100%;\n  background: linear-gradient(90deg, #ffd27a, #ff8f3f);\n  border-radius: 3px;\n}\n.compare-row { margin-bottom: 14px; }\n.compare-row-head {\n  display: flex; justify-content: space-between;\n  font-size: 12px;\n  margin-bottom: 4px;\n}\n.compare-row-head strong { font-weight: 500; }\n.compare-row-head span { color: rgba(255,255,255,0.55); font-variant-numeric: tabular-nums; }\n\n/* ==== Trivia ticker ==== */\n.trivia {\n  position: absolute;\n  bottom: 90px;\n  left: 20px;\n  max-width: 340px;\n  background: rgba(10, 12, 24, 0.55);\n  backdrop-filter: blur(16px);\n  -webkit-backdrop-filter: blur(16px);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 12px;\n  padding: 14px 16px;\n  font-size: 12px;\n  line-height: 1.55;\n  color: rgba(255,255,255,0.78);\n  z-index: 9;\n  display: flex;\n  gap: 10px;\n  align-items: flex-start;\n}\n.trivia .label {\n  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;\n  color: #ffd27a;\n  font-weight: 600;\n  flex-shrink: 0;\n  padding-top: 1px;\n}\n.trivia.hidden { display: none; }\n\n/* ==== Planet label (3D overlay) ==== */\n.planet-label {\n  position: absolute;\n  transform: translate(-50%, -140%);\n  padding: 4px 10px;\n  background: rgba(10, 12, 24, 0.6);\n  backdrop-filter: blur(8px);\n  -webkit-backdrop-filter: bottom: 10px; gap: 8px; }\n.tweaks .row label { color: rgba(255,255,255,0.7); }\n\n@media (max-width: 920px) {\n  .rail { display: none; }\n  .info-panel { width: calc(100vw - 40px); top: 80px; bottom: 160px; }\n  .trivia { display: none; }\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div id=\"app\">\n  <div id=\"scene\"><\u002Fdiv>\n\n  <!-- Top bar -->\n  <div class=\"topbar\">\n    <div class=\"brand\">\n      <p class=\"eyebrow\">Science · Space<\u002Fp>\n      <h1>Our <em>Solar<\u002Fem> System<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"top-actions\">\n      <button class=\"pill-btn\" id=\"btn-tour\"><span class=\"dot\"><\u002Fspan>Start Tour<\u002Fbutton>\n      <button class=\"pill-btn\" id=\"btn-reset\">↺ Overview<\u002Fbutton>\n      <button class=\"pill-btn\" id=\"btn-tweaks\">⚙︎ Tweaks<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Left: planet rail -->\n  <nav class=\"rail\" id=\"rail\"><\u002Fnav>\n\n  <!-- Bottom control dock -->\n  <div class=\"dock\">\n    <div class=\"group\">\n      <button class=\"icon-btn\" id=\"btn-play\" title=\"Play / Pause\">\n        <svg viewBox=\"0 0 24 24\" fill=\"currentColor\" id=\"play-icon\"><path d=\"M8 5v14l11-7z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <label>Speed<\u002Flabel>\n      <input type=\"range\" class=\"slider\" id=\"speed\" min=\"0\" max=\"10\" step=\"0.1\" value=\"1\">\n      <span class=\"speed-readout\" id=\"speed-readout\">1.0×<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"group\">\n      <button class=\"icon-btn active\" id=\"btn-orbits\" title=\"Toggle orbit lines\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><ellipse cx=\"12\" cy=\"12\" rx=\"9\" ry=\"4\"><\u002Fellipse><circle cx=\"12\" cy=\"12\" r=\"2\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fbutton>\n      <button class=\"icon-btn active\" id=\"btn-labels\" title=\"Toggle planet labels\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><rect x=\"3\" y=\"7\" width=\"18\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M7 12h10\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"group\">\n      <button class=\"icon-btn\" id=\"btn-random\" title=\"Random fact\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M4 4h4l12 16h-4\"><\u002Fpath><path d=\"M4 20h4L20 4h-4\"><\u002Fpath><path d=\"M17 4l3 0M17 20l3 0\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Trivia ticker -->\n  <div class=\"trivia\" id=\"trivia\">\n    <span class=\"label\">Did you know?<\u002Fspan>\n    <span id=\"trivia-text\">The solar system formed 4.6 billion years ago.<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- Info panel -->\n  <aside class=\"info-panel\" id=\"info-panel\">\n    <button class=\"info-close\" id=\"info-close\" aria-label=\"Close\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n    <div class=\"info-hero\">\n      <div class=\"info-orb\" id=\"info-orb\"><\u002Fdiv>\n      <div>\n        <p class=\"info-type\" id=\"info-type\">Terrestrial planet<\u002Fp>\n        <h2 class=\"info-name\" id=\"info-name\">Earth<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"info-blurb\" id=\"info-blurb\"><\u002Fp>\n\n    <div class=\"tabs\" id=\"tabs\">\n      <button class=\"tab active\" data-tab=\"stats\">Stats<\u002Fbutton>\n      <button class=\"tab\" data-tab=\"facts\">Facts<\u002Fbutton>\n      <button class=\"tab\" data-tab=\"compare\">Compare<\u002Fbutton>\n      <button class=\"tab\" data-tab=\"explore\">Exploration<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"tab-content\" id=\"tab-content\"><\u002Fdiv>\n  <\u002Faside>\n\n  <!-- Hint -->\n  <div class=\"hint\" id=\"hint\">Drag to orbit · Scroll to zoom · Click any planet<\u002Fdiv>\n\n  <!-- Tour banner -->\n  <div class=\"tour-banner\" id=\"tour-banner\">🚀 Grand Tour · Now visiting <span id=\"tour-name\">Mercury<\u002Fspan><\u002Fdiv>\n\n  <!-- Tweaks -->\n  <div class=\"tweaks\" id=\"tweaks\">\n    <h4>Tweaks<\u002Fh4>\n    <div class=\"row\"><label>Show orbits<\u002Flabel><input type=\"checkbox\" id=\"tw-orbits\" checked=\"\"><\u002Fdiv>\n    <div class=\"row\"><label>Show labels<\u002Flabel><input type=\"checkbox\" id=\"tw-labels\" checked=\"\"><\u002Fdiv>\n    <div class=\"row\"><label>Show trivia<\u002Flabel><input type=\"checkbox\" id=\"tw-trivia\" checked=\"\"><\u002Fdiv>\n    <div class=\"row\"><label>Auto-rotate tour<\u002Flabel><input type=\"checkbox\" id=\"tw-tour\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Three.js -->\n<script src=\"af079432-9b73-46e3-a6cb-deb8a3dd822e\"><\u002Fscript>\n<script src=\"d5a9606f-a111-497b-b74b-dfd251894100\"><\u002Fscript>\n<script src=\"ac36eba6-1200-435d-9abf-7ca15358d7a7\"><\u002Fscript>\n<script src=\"c6201466-359b-46a7-b6dd-9fad3931dca8\"><\u002Fscript>\n<script>\n(function() {\n  const PLANETS = window.PLANET_DATA;\n\n  // ===== Build planet rail =====\n  const rail = document.getElementById('rail');\n  PLANETS.forEach(p => {\n    const btn = document.createElement('button');\n    btn.className = 'rail-btn';\n    btn.dataset.planet = p.id;\n    const hex = '#' + p.color.toString(16).padStart(6,'0');\n    btn.innerHTML = `\n      <span class=\"rail-swatch\" style=\"background:radial-gradient(circle at 30% 30%, #fff5, transparent 50%), ${hex};\"><\u002Fspan>\n      <span class=\"rail-name\">${p.name}<\u002Fspan>\n      <span class=\"rail-meta\">${p.id === 'sun' ? 'STAR' : '0' + (PLANETS.indexOf(p))}<\u002Fspan>\n    `;\n    btn.addEventListener('click', () => SolarApp.focusPlanet(p.id));\n    rail.appendChild(btn);\n  });\n\n  // ===== Info panel =====\n  const panel = document.getElementById('info-panel');\n  const tabs = document.getElementById('tabs');\n  const tabContent = document.getElementById('tab-content');\n  let currentPlanet = null;\n  let currentTab = 'stats';\n\n  function escapeHtml(s) { return String(s).replace(/[&<>\"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[m])); }\n\n  function renderTab() {\n    if (!currentPlanet) return;\n    const p = currentPlanet;\n    if (currentTab === 'stats') {\n      tabContent.innerHTML = `\n        <h4>Vital Statistics<\u002Fh4>\n        <div class=\"stat-grid\">\n          ${p.stats.map(([k,v]) => `\n            <div class=\"stat\"><div class=\"stat-label\">${escapeHtml(k)}<\u002Fdiv><div class=\"stat-value\">${escapeHtml(v)}<\u002Fdiv><\u002Fdiv>\n          `).join('')}\n        <\u002Fdiv>\n        <h4>Profile<\u002Fh4>\n        <div class=\"stat-grid\">\n          <div class=\"stat\"><div class=\"stat-label\">Type<\u002Fdiv><div class=\"stat-value\">${escapeHtml(p.type)}<\u002Fdiv><\u002Fdiv>\n          <div class=\"stat\"><div class=\"stat-label\">Day length<\u002Fdiv><div class=\"stat-value\">${escapeHtml(p.day)}<\u002Fdiv><\u002Fdiv>\n          <div class=\"stat\"><div class=\"stat-label\">Year length<\u002Fdiv><div class=\"stat-value\">${escapeHtml(p.year)}<\u002Fdiv><\u002Fdiv>\n          <div class=\"stat\"><div class=\"stat-label\">Gravity<\u002Fdiv><div class=\"stat-value\">${escapeHtml(p.gravity)}<\u002Fdiv><\u002Fdiv>\n          <div class=\"stat\"><div class=\"stat-label\">Temperature<\u002Fdiv><div class=\"stat-value\">${escapeHtml(p.temp)}<\u002Fdiv><\u002Fdiv>\n          <div class=\"stat\"><div class=\"stat-label\">Moons<\u002Fdiv><div class=\"stat-value\">${p.moons}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <h4>Composition<\u002Fh4>\n        <p>${escapeHtml(p.composition)}<\u002Fp>\n        <h4>Discovery<\u002Fh4>\n        <p>${escapeHtml(p.discovered)}<\u002Fp>\n      `;\n    } else if (currentTab === 'facts') {\n      tabContent.innerHTML = `\n        <h4>Fascinating Facts<\u002Fh4>\n        <ul class=\"fact-list\">\n          ${p.facts.map(f => `<li>${escapeHtml(f)}<\u002Fli>`).join('')}\n        <\u002Ful>\n      `;\n    } else if (currentTab === 'compare') {\n      // Compare radius, year, gravity, moons vs Earth\n      const earth = PLANETS.find(x => x.id === 'earth');\n      const cmps = [\n        { label: 'Size (radius)', v: p.realRadius, e: earth.realRadius, unit: '× Earth' },\n        { label: 'Year length (days)', v: p.id === 'sun' ? 0 : (p.orbitalPeriod || 0), e: earth.orbitalPeriod, unit: '× Earth year' },\n        { label: 'Day length', v: Math.abs(p.rotationPeriod) || 1, e: earth.rotationPeriod, unit: '× Earth day' },\n        { label: 'Moons', v: p.moons, e: earth.moons || 1, unit: '× Earth\\'s' }\n      ];\n      tabContent.innerHTML = `\n        <h4>Compared to Earth<\u002Fh4>\n        ${cmps.map(c => {\n          const ratio = c.v / c.e;\n          const pct = Math.min(100, Math.log10(ratio + 1) * 40);\n          const display = ratio >= 100 ? ratio.toFixed(0) : ratio >= 10 ? ratio.toFixed(1) : ratio.toFixed(2);\n          return `<div class=\"compare-row\">\n            <div class=\"compare-row-head\"><strong>${c.label}<\u002Fstrong><span>${display} ${c.unit}<\u002Fspan><\u002Fdiv>\n            <div class=\"compare-bar\"><div class=\"compare-fill\" style=\"width:${pct}%\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>`;\n        }).join('')}\n        <h4>At a glance<\u002Fh4>\n        <p style=\"color: rgba(255,255,255,0.7);\">Distance from Sun: <strong style=\"color:#ffd27a\">${p.id === 'sun' ? '—' : (p.distance ? (p.distance / 85).toFixed(2) + ' AU (scene)' : '—')}<\u002Fstrong><\u002Fp>\n      `;\n    } else if (currentTab === 'explore') {\n      tabContent.innerHTML = `\n        <h4>Missions & Exploration<\u002Fh4>\n        <ul class=\"expl-list\">\n          ${p.exploration.map(e => `<li>${escapeHtml(e)}<\u002Fli>`).join('')}\n        <\u002Ful>\n      `;\n    }\n  }\n\n  tabs.addEventListener('click', (e) => {\n    const btn = e.target.closest('.tab');\n    if (!btn) return;\n    currentTab = btn.dataset.tab;\n    tabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));\n    renderTab();\n  });\n\n  function showPlanet(p) {\n    currentPlanet = p;\n    const hex = '#' + p.color.toString(16).padStart(6,'0');\n    document.getElementById('info-orb').style.background = `radial-gradient(circle at 30% 30%, #fff6, transparent 50%), ${hex}`;\n    document.getElementById('info-orb').style.boxShadow = `inset -8px -8px 18px rgba(0,0,0,0.55), 0 0 28px ${hex}55`;\n    document.getElementById('info-type').textContent = p.type;\n    document.getElementById('info-name').textContent = p.name;\n    document.getElementById('info-blurb').textContent = p.blurb;\n    renderTab();\n    panel.classList.add('open');\n    document.getElementById('hint').classList.add('hidden');\n    // Highlight rail\n    rail.querySelectorAll('.rail-btn').forEach(b => b.classList.toggle('active', b.dataset.planet === p.id));\n  }\n\n  function hidePanel() {\n    panel.classList.remove('open');\n    rail.querySelectorAll('.rail-btn').forEach(b => b.classList.remove('active'));\n    currentPlanet = null;\n  }\n\n  document.getElementById('info-close').addEventListener('click', () => {\n    hidePanel();\n    SolarSystem.resetView();\n  });\n\n  // ===== Top buttons =====\n  document.getElementById('btn-reset').addEventListener('click', () => {\n    hidePanel();\n    SolarSystem.resetView();\n    stopTour();\n  });\n\n  const tourBtn = document.getElementById('btn-tour');\n  function startTour() {\n    SolarSystem.tour.active = true;\n    SolarSystem.tour.i = 0; SolarSystem.tour.t = 0;\n    SolarApp.focusPlanet('sun');\n    tourBtn.classList.add('active');\n    tourBtn.innerHTML = '<span class=\"dot\"><\u002Fspan>Stop Tour';\n    const banner = document.getElementById('tour-banner');\n    banner.classList.add('show');\n    document.getElementById('tour-name').textContent = 'The Sun';\n  }\n  function stopTour() {\n    SolarSystem.tour.active = false;\n    tourBtn.classList.remove('active');\n    tourBtn.innerHTML = '<span class=\"dot\"><\u002Fspan>Start Tour';\n    document.getElementById('tour-banner').classList.remove('show');\n  }\n  tourBtn.addEventListener('click', () => {\n    if (SolarSystem.tour.active) stopTour(); else startTour();\n  });\n\n  // ===== Tweaks panel =====\n  const tweaks = document.getElementById('tweaks');\n  document.getElementById('btn-tweaks').addEventListener('click', () => {\n    tweaks.classList.toggle('open');\n  });\n  document.getElementById('tw-orbits').addEventListener('change', (e) => {\n    SolarSystem.setOrbitsVisible(e.target.checked);\n    document.getElementById('btn-orbits').classList.toggle('active', e.target.checked);\n  });\n  document.getElementById('tw-labels').addEventListener('change', (e) => {\n    SolarSystem.setLabelsVisible(e.target.checked);\n    document.getElementById('btn-labels').classList.toggle('active', e.target.checked);\n  });\n  document.getElementById('tw-trivia').addEventListener('change', (e) => {\n    document.getElementById('trivia').classList.toggle('hidden', !e.target.checked);\n  });\n  document.getElementById('tw-tour').addEventListener('change', (e) => {\n    if (e.target.checked) startTour(); else stopTour();\n  });\n\n  // ===== Dock controls =====\n  const playBtn = document.getElementById('btn-play');\n  const playIcon = document.getElementById('play-icon');\n  playBtn.addEventListener('click', () => {\n    SolarSystem.paused = !SolarSystem.paused;\n    playIcon.innerHTML = SolarSystem.paused\n      ? '<path d=\"M8 5v14l11-7z\"/>'\n      : '<path d=\"M6 5h4v14H6zM14 5h4v14h-4z\"/>';\n    playBtn.classList.toggle('active', SolarSystem.paused);\n  });\n\n  const speed = document.getElementById('speed');\n  const speedReadout = document.getElementById('speed-readout');\n  speed.addEventListener('input', () => {\n    SolarSystem.speed = parseFloat(speed.value);\n    speedReadout.textContent = SolarSystem.speed.toFixed(1) + '×';\n  });\n\n  document.getElementById('btn-orbits').addEventListener('click', (e) => {\n    const now = !e.currentTarget.classList.contains('active');\n    e.currentTarget.classList.toggle('active', now);\n    SolarSystem.setOrbitsVisible(now);\n    document.getElementById('tw-orbits').checked = now;\n  });\n  document.getElementById('btn-labels').addEventListener('click', (e) => {\n    const now = !e.currentTarget.classList.contains('active');\n    e.currentTarget.classList.toggle('active', now);\n    SolarSystem.setLabelsVisible(now);\n    document.getElementById('tw-labels').checked = now;\n  });\n\n  // Random fact\n  const triviaEl = document.getElementById('trivia-text');\n  function randomFact() {\n    const pool = window.SS_TRIVIA.concat(PLANETS.flatMap(p => p.facts || []));\n    triviaEl.textContent = pool[Math.floor(Math.random() * pool.length)];\n  }\n  document.getElementById('btn-random').addEventListener('click', randomFact);\n  setInterval(randomFact, 10000);\n  randomFact();\n\n  // ===== SolarApp API =====\n  window.SolarApp = {\n    focusPlanet(id) {\n      const p = PLANETS.find(x => x.id === id);\n      if (!p) return;\n      showPlanet(p);\n      SolarSystem.flyTo(id);\n      if (SolarSystem.tour.active) {\n        document.getElementById('tour-name').textContent = p.name;\n      }\n    }\n  };\n\n  // ===== Kick off =====\n  SolarSystem.init();\n\n  // Hide hint after 8s\n  setTimeout(() => document.getElementById('hint').classList.add('hidden'), 8000);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
